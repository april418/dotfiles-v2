---
- name: Setup local machine
  hosts: localhost
  vars_prompt:
    - name: git_user_name
      prompt: "Git user name"
      private: false
    - name: git_user_email
      prompt: "Git user email"
      private: false
    - name: flatt_guard_token
      prompt: "Flatt Guard token (skip: Enter)"
      private: true
      default: ""
  pre_tasks:
    - name: Detect WSL environment
      ansible.builtin.set_fact:
        is_wsl: "{{ 'microsoft' in ansible_facts['kernel'] | lower }}"
  roles:
    - bash
    - claude
    - fonts
    - git
    - motd
    - node
    - npm
    - pnpm
    - screen
    - uv
    - vim
    - zsh
