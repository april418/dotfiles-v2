---
- name: Setup local machine
  hosts: localhost
  pre_tasks:
    - name: Detect WSL environment
      ansible.builtin.set_fact:
        is_wsl: "{{ 'microsoft' in ansible_facts['kernel'] | lower }}"

    # ── apt ソースの競合を解消 ──
    - name: Remove conflicting GitHub CLI apt source
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/github-cli.list
        state: absent
      become: true
      when: ansible_facts['os_family'] == 'Debian'

    - name: Remove old GitHub CLI GPG key
      ansible.builtin.file:
        path: /usr/share/keyrings/githubcli-archive-keyring.gpg
        state: absent
      become: true
      when: ansible_facts['os_family'] == 'Debian'

    # ── git_user_name / git_user_email ──
    - name: Read existing git user.name # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: git config --get user.name
      register: _git_user_name
      changed_when: false
      failed_when: false

    - name: Read existing git user.email # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: git config --get user.email
      register: _git_user_email
      changed_when: false
      failed_when: false

    - name: Prompt for git user.name
      ansible.builtin.pause:
        prompt: "Git user name"
      register: _git_user_name_input
      when: _git_user_name.rc != 0 or _git_user_name.stdout | trim == ""

    - name: Prompt for git user.email
      ansible.builtin.pause:
        prompt: "Git user email"
      register: _git_user_email_input
      when: _git_user_email.rc != 0 or _git_user_email.stdout | trim == ""

    - name: Set git_user_name
      ansible.builtin.set_fact:
        git_user_name: >-
          {{ _git_user_name_input.user_input
             if _git_user_name_input is not skipped
             else _git_user_name.stdout | trim }}

    - name: Set git_user_email
      ansible.builtin.set_fact:
        git_user_email: >-
          {{ _git_user_email_input.user_input
             if _git_user_email_input is not skipped
             else _git_user_email.stdout | trim }}

    # ── flatt_guard_token ──
    - name: Read existing Flatt Guard token line from .npmrc
      ansible.builtin.command:
        cmd: "grep //npm.flatt.tech/:_authToken= {{ ansible_facts['env'].HOME }}/.npmrc"
      register: _flatt_guard_token_raw
      changed_when: false
      failed_when: false

    - name: Extract Flatt Guard token value
      ansible.builtin.set_fact:
        _flatt_guard_token: >-
          {{ _flatt_guard_token_raw.stdout
             | regex_replace('^.*:_authToken=', '')
             | trim }}

    - name: Prompt for Flatt Guard token
      ansible.builtin.pause:
        prompt: "Flatt Guard token (skip: Enter)"
      register: _flatt_guard_token_input
      when: _flatt_guard_token == ""

    - name: Set flatt_guard_token
      ansible.builtin.set_fact:
        flatt_guard_token: >-
          {{ _flatt_guard_token_input.user_input | default("")
             if _flatt_guard_token_input is not skipped
             else _flatt_guard_token }}

  roles:
    - bash
    - claude
    - fonts
    - git
    - motd
    - node
    - npm
    - pnpm
    - screen
    - uv
    - vim
    - zsh
