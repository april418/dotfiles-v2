---
- name: Check if Claude CLI is already installed
  ansible.builtin.stat:
    path: "{{ ansible_facts['env'].HOME }}/.local/bin/claude"
  register: claude_cli_bin

- name: Download Claude CLI install script
  ansible.builtin.get_url:
    url: https://claude.ai/install.sh
    dest: /tmp/claude_install.sh
    mode: "0755"
  when: not claude_cli_bin.stat.exists and ansible_facts['os_family'] != 'Windows'

- name: Install Claude CLI
  ansible.builtin.command:
    cmd: bash /tmp/claude_install.sh
  when: not claude_cli_bin.stat.exists and ansible_facts['os_family'] != 'Windows'
  changed_when: true

- name: Debug Claude CLI already installed
  ansible.builtin.debug:
    msg: "{{ ansible_facts['env'].HOME }}/.local/bin/claude already exists, skipping Claude CLI installation."
  when: claude_cli_bin.stat.exists

- name: Ensure .claude directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env'].HOME }}/.claude"
    state: directory
    mode: "0700"

- name: Copy CLAUDE.md
  ansible.builtin.copy:
    src: files/CLAUDE.md
    dest: "{{ ansible_facts['env'].HOME }}/.claude/CLAUDE.md"
    mode: "0644"

- name: Copy settings.json
  ansible.builtin.copy:
    src: files/settings.json
    dest: "{{ ansible_facts['env'].HOME }}/.claude/settings.json"
    mode: "0644"

- name: Ensure ccstatusline config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env'].HOME }}/.config/ccstatusline"
    state: directory
    mode: "0755"

- name: Copy ccstatusline settings
  ansible.builtin.copy:
    src: files/ccstatusline.json
    dest: "{{ ansible_facts['env'].HOME }}/.config/ccstatusline/settings.json"
    mode: "0644"

- name: Copy skills
  ansible.builtin.copy:
    src: files/skills/
    dest: "{{ ansible_facts['env'].HOME }}/.claude/skills/"
    mode: "0644"

- name: Copy agents
  ansible.builtin.copy:
    src: files/agents/
    dest: "{{ ansible_facts['env'].HOME }}/.claude/agents/"
    mode: "0644"

- name: Ensure external skill directories exist
  ansible.builtin.file:
    path: "{{ ansible_facts['env'].HOME }}/.claude/skills/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - frontend-design
    - empirical-prompt-tuning

- name: Download external skills
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ ansible_facts['env'].HOME }}/.claude/skills/{{ item.dest }}"
    mode: "0644"
  loop:
    - url: https://raw.githubusercontent.com/anthropics/claude-code/main/plugins/frontend-design/skills/frontend-design/SKILL.md
      dest: frontend-design/SKILL.md
    # mizchi/skills は category 配下に再配置された (meta/empirical-prompt-tuning)。
    # 同種の再配置やリネームでビルドが壊れないよう、main の追従ではなくコミット SHA で固定する。
    # 更新時はこの SHA を新しいコミットへ差し替える。
    - url: https://raw.githubusercontent.com/mizchi/skills/89c1b34018ba0d85a770c065ba22f83a8d004d34/meta/empirical-prompt-tuning/SKILL.md
      dest: empirical-prompt-tuning/SKILL.md
  loop_control:
    label: "{{ item.dest }}"
