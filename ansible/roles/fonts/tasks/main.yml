---
- name: Install fontconfig on Debian-based systems
  ansible.builtin.apt:
    name: fontconfig
    state: present
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Install fontconfig on RedHat-based systems
  ansible.builtin.dnf:
    name: fontconfig
    state: present
  become: true
  when: ansible_facts['os_family'] == 'RedHat'

- name: Download MesloLGS NF fonts
  ansible.builtin.get_url:
    url: "https://github.com/romkatv/powerlevel10k-media/raw/master/{{ item | urlencode }}"
    dest: "/tmp/{{ item }}"
  with_items: "{{ font_files }}"
  when: ansible_facts['os_family'] in ['Debian', 'RedHat', 'Darwin']

- name: Move MesloLGS NF fonts to system fonts directory on Debian-based systems
  ansible.builtin.copy:
    src: "/tmp/{{ item }}"
    dest: "/usr/share/fonts/truetype/{{ item }}"
    owner: root
    group: root
    mode: '0644'
  become: true
  with_items: "{{ font_files }}"
  when: (ansible_facts['os_family'] == 'Debian' or ansible_facts['os_family'] == 'RedHat') and not is_wsl

- name: Create fontconfig local.conf for WSL
  ansible.builtin.template:
    src: local.conf.j2
    dest: /etc/fonts/local.conf
    owner: root
    group: root
    mode: '0644'
  become: true
  when: is_wsl

- name: Rebuild font cache on Debian-based systems
  ansible.builtin.command:
    cmd: "fc-cache -f -v"
  become: true
  when: ansible_facts['os_family'] == 'Debian' or ansible_facts['os_family'] == 'RedHat'

- name: Install MesloLGS NF fonts on MacOS
  ansible.builtin.copy:
    src: "/tmp/{{ item }}"
    dest: "~/Library/Fonts/{{ item }}"
  with_items: "{{ font_files }}"
  when: ansible_facts['os_family'] == 'Darwin'

- name: Get Windows LOCALAPPDATA path on WSL
  ansible.builtin.shell:
    cmd: cmd.exe /c 'echo %LOCALAPPDATA%' 2>/dev/null | tr -d '\r\n'
  register: win_localappdata_raw
  changed_when: false
  when: is_wsl

- name: Convert Windows LOCALAPPDATA path to WSL path
  ansible.builtin.command:
    cmd: "wslpath '{{ win_localappdata_raw.stdout }}'"
  register: win_localappdata_wsl
  changed_when: false
  when: is_wsl

- name: Ensure Windows user font directory exists on WSL
  ansible.builtin.file:
    path: "{{ win_localappdata_wsl.stdout }}/Microsoft/Windows/Fonts"
    state: directory
  when: is_wsl

- name: Install MesloLGS NF fonts to Windows user font directory on WSL
  ansible.builtin.copy:
    src: "/tmp/{{ item }}"
    dest: "{{ win_localappdata_wsl.stdout }}/Microsoft/Windows/Fonts/{{ item }}"
  with_items: "{{ font_files }}"
  when: is_wsl

- name: Register fonts in Windows user registry on WSL
  ansible.builtin.command:
    cmd: >-
      reg.exe add "HKCU\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Fonts"
      /v "{{ item | regex_replace('\.ttf$', '') }} (TrueType)"
      /t REG_SZ
      /d "{{ win_localappdata_raw.stdout }}\Microsoft\Windows\Fonts\{{ item }}"
      /f
  with_items: "{{ font_files }}"
  when: is_wsl

- name: Download MesloLGS NF fonts on Windows
  ansible.windows.win_get_url:
    url: "https://github.com/romkatv/powerlevel10k-media/raw/master/{{ item | urlencode }}"
    dest: "{{ ansible_facts['env']['TEMP'] }}\\{{ item }}"
  with_items: "{{ font_files }}"
  when: ansible_facts['os_family'] == 'Windows'

- name: Ensure Windows user font directory exists
  ansible.windows.win_file:
    path: "{{ ansible_facts['env']['LOCALAPPDATA'] }}\\Microsoft\\Windows\\Fonts"
    state: directory
  when: ansible_facts['os_family'] == 'Windows'

- name: Install MesloLGS NF fonts to Windows user font directory
  ansible.windows.win_copy:
    src: "{{ ansible_facts['env']['TEMP'] }}\\{{ item }}"
    dest: "{{ ansible_facts['env']['LOCALAPPDATA'] }}\\Microsoft\\Windows\\Fonts\\{{ item }}"
    remote_src: true
  with_items: "{{ font_files }}"
  when: ansible_facts['os_family'] == 'Windows'

- name: Register fonts in Windows user registry
  ansible.windows.win_regedit:
    path: HKCU:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Fonts
    name: "{{ item | regex_replace('\\.ttf$', '') }} (TrueType)"
    data: "{{ ansible_facts['env']['LOCALAPPDATA'] }}\\Microsoft\\Windows\\Fonts\\{{ item }}"
    type: string
  with_items: "{{ font_files }}"
  when: ansible_facts['os_family'] == 'Windows'
