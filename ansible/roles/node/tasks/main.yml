---
- name: Check if nvm is already installed
  ansible.builtin.stat:
    path: "{{ node_nvm_dir }}/nvm.sh"
  register: node_nvm_sh

- name: Download nvm install script
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/nvm-sh/nvm/{{ node_nvm_version }}/install.sh"
    dest: /tmp/nvm_install.sh
    mode: "0755"
  when: not node_nvm_sh.stat.exists and ansible_facts['os_family'] != 'Windows'

- name: Install nvm in non-Windows systems
  ansible.builtin.command:
    cmd: bash /tmp/nvm_install.sh
  when: not node_nvm_sh.stat.exists and ansible_facts['os_family'] != 'Windows'
  changed_when: true

- name: Debug nvm already installed
  ansible.builtin.debug:
    msg: "{{ node_nvm_dir }}/nvm.sh already exists, skipping nvm installation."
  when: node_nvm_sh.stat.exists
