---
- name: Check if uv is already installed
  ansible.builtin.stat:
    path: "{{ ansible_facts['env'].HOME }}/.local/bin/uv"
  register: uv_bin

- name: Download uv install script
  ansible.builtin.get_url:
    url: https://astral.sh/uv/install.sh
    dest: /tmp/uv_install.sh
    mode: "0755"
  when: not uv_bin.stat.exists and ansible_facts['os_family'] != 'Windows'

- name: Install uv
  ansible.builtin.command:
    cmd: sh /tmp/uv_install.sh
  when: not uv_bin.stat.exists and ansible_facts['os_family'] != 'Windows'
  changed_when: true

- name: Debug uv already installed
  ansible.builtin.debug:
    msg: "{{ ansible_facts['env'].HOME }}/.local/bin/uv already exists, skipping uv installation."
  when: uv_bin.stat.exists

- name: Ensure uv config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env'].HOME }}/.config/uv"
    state: directory
    mode: "0755"

- name: Copy uv.toml
  ansible.builtin.copy:
    src: files/.config/uv/uv.toml
    dest: "{{ ansible_facts['env'].HOME }}/.config/uv/uv.toml"
    mode: "0644"
