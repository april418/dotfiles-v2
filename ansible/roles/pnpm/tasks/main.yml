---
- name: Ensure pnpm config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env'].HOME }}/.config/pnpm"
    state: directory
    mode: "0755"

- name: Copy pnpm rc
  ansible.builtin.copy:
    src: files/.config/pnpm/rc
    dest: "{{ ansible_facts['env'].HOME }}/.config/pnpm/rc"
