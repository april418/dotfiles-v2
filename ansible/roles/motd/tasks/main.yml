---
- name: Install motd dependencies on Debian-based systems
  ansible.builtin.apt:
    name:
      - figlet
      - iproute2
      - ncurses-bin
    state: present
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Install motd dependencies on RedHat-based systems
  ansible.builtin.dnf:
    name:
      - figlet
      - iproute
      - ncurses
    state: present
  become: true
  when: ansible_facts['os_family'] == 'RedHat'

- name: Copy motd file
  ansible.builtin.copy:
    src: motd.sh
    dest: /etc/motd
    owner: root
    group: root
    mode: '0644'
  become: yes
  when : ansible_facts['os_family'] == 'Debian' or ansible_facts['os_family'] == 'RedHat'
